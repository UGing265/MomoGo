spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**

        - id: wallet-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/wallet/**

# Override circuit breaker for local (disable or reduce)
resilience4j:
  circuitbreaker:
    instances:
      userServiceCircuitBreaker:
        failureRateThreshold: 100
        slidingWindowSize: 2
      walletServiceCircuitBreaker:
        failureRateThreshold: 100
        slidingWindowSize: 2
