server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**
        - id: wallet-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/wallet/**
      default-filters:
        - StripPrefix=0