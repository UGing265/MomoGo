spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**

        - id: wallet-service
          uri: lb://wallet-service
          predicates:
            - Path=/api/wallet/**

# Docker/K8s environment variables
# USER_SERVICE_URL=lb://user-service
# WALLET_SERVICE_URL=lb://wallet-service
